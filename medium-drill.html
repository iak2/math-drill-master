<html>
<!--
 Simple math test by Igor Keselman which I wrote for Michael.
 Timer functionality is based on script By Lefteris Haritou
   http://www.geocities.com/~lef
-->

<head>
  <title>Math Drill</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: linear-gradient(140deg, #eef4ff 0%, #f8faff 45%, #edf8f2 100%);
      color: #1f2937;
    }

    body {
      min-height: 100vh;
      padding: 16px;
    }

    .app-shell {
      width: min(1100px, 100%);
      min-height: calc(100vh - 32px);
      margin: 0 auto;
      background: #ffffffcc;
      border: 1px solid #dbe4f3;
      border-radius: 16px;
      box-shadow: 0 8px 24px #2d3f5f1c;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: 0.4px;
    }

    form[name="frm"] {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
      min-height: 0;
    }

    .controls-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 18px;
      font-size: 0.98rem;
    }

    .controls-row label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }

    .actions-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .session-timer {
      margin-left: auto;
      min-height: 1.4em;
      font-weight: 700;
      color: #2743a6;
    }

    input[type="button"] {
      border: none;
      border-radius: 10px;
      background: #3159dd;
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.1s ease, filter 0.15s ease;
    }

    input[type="button"]:hover {
      filter: brightness(1.06);
    }

    input[type="button"]:active {
      transform: translateY(1px);
    }

    input[type="button"]:disabled {
      cursor: not-allowed;
      background: #a4b1d9;
    }

    .task {
      font-size: 1.1rem;
      text-align: center;
      border: 1px solid #cdd8ef;
      border-radius: 8px;
      padding: 6px 4px;
      background: #fff;
    }

    .hidTask {
      font-size: 1.1rem;
      text-align: center;
      display: none;
    }

    .correct {
      font-size: 1.05rem;
      text-align: center;
      background: #bbf7d0;
      border: 1px solid #74d89b;
      border-radius: 8px;
      padding: 6px 4px;
      display: inline;
    }

    .wrong {
      font-size: 1.05rem;
      text-align: center;
      background: #fecaca;
      border: 1px solid #f19797;
      border-radius: 8px;
      padding: 6px 4px;
      display: inline;
    }

    .tasks-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
      border: 1px solid #d9e4f7;
      border-radius: 12px;
      background: #f8fbff;
      padding: 10px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    table {
      width: auto;
      border-collapse: separate;
      border-spacing: 0 2px;
    }

    td {
      padding: 0 0;
      vertical-align: middle;
    }

    td.task {
      border: none;
      background: transparent;
      font-weight: 700;
      padding: 0 1px;
      width: 14px;
    }

    textarea[name="log"] {
      width: 100%;
      min-height: 120px;
      border: 1px solid #cad7ef;
      border-radius: 10px;
      padding: 10px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.9rem;
      color: #1e293b;
      background: #f8fbff;
      resize: vertical;
    }

    @media (max-width: 760px) {
      body {
        padding: 10px;
      }

      .app-shell {
        min-height: calc(100vh - 20px);
        padding: 14px;
      }

      .session-timer {
        margin-left: 0;
        width: 100%;
      }

      .task {
        font-size: 1rem;
      }
    }
  </style>
  <script type="text/javascript">
    var limits = new Map()
    limits.set('low-easy',0);
    limits.set('high-easy',10);
    limits.set('low-hard',0);
    limits.set('high-hard',100);
    
    var SESSION_TIMEOUT_PERIOD = 1120; //how much time (in secs) before session expires
    var SAMPLE_SIZE = 12;           //how many examples
    var etime = 0;  //expiration time
    var ctime = 0;  //current time
    var ntime = 0;  //notification time
    var flag = true;
    var a_operands = new Array(3);
    var operands_count;
    var operands_str;
    var RESULTS_STORAGE_KEY = "mathDrillLastResults";
    function display() {
      rtime = etime - ctime;
      if (rtime > 60) {
        m = parseInt(rtime / 60);
        if (m < 10)
          m = "0" + m;
      } else {
        m = "00";
      }
      s = parseInt(rtime - m * 60);
      if (s < 10)
        s = "0" + s
      document.getElementById("sessionTimer").innerHTML = "Time Remaining :  " + m + ":" + s;
      window.setTimeout("checktime()", 1000)
    }
    function remind() {
      ntime = 0;
      alert("Your session will expire soon. Please save your work." + rtime);
    }
    function settimes() {
      var time = new Date();
      hours = time.getHours();
      mins = time.getMinutes();
      secs = time.getSeconds();
      etime = hours * 3600 + mins * 60 + secs + SESSION_TIMEOUT_PERIOD;
      checktime();
    }
    function checktime() {
      var time = new Date();
      hours = time.getHours();
      mins = time.getMinutes();
      secs = time.getSeconds();
      ctime = hours * 3600 + mins * 60 + secs;
      if (ctime >= etime) {
        expired();
      } else {
        display();
      }
    }
    function expired() {
      if (document.frm.btnPrepare.disabled)
        check();
    }
    ////////////////////////////////////////////////////
    function getRandom(min, max) {
      return (Math.round(Math.random() * (max - min))) + min;
    }
    function prepare() {
      //load operands
      operands_count = 0;
      operands_str = "";
      j = 0;
      for (i = 0; i < 3; i++) {
        if (document.frm.operands[i].checked) {
          a_operands[j++] = document.frm.operands[i].value;
          operands_str += document.frm.operands[i].value + " ";
        }
      }
      operands_count = j;
      if (operands_count == 0) {
        alert("Please select an operation");
        return;
      }
      for (i = 0; i < SAMPLE_SIZE; i++)
        setTask(i);
      settimes();
      document.frm.btnCheck.disabled = false;
      document.frm.btnPrepare.disabled = true;
    }
    function check() {
      document.frm.btnCheck.disabled = true;
      document.frm.btnPrepare.disabled = false;
      var correctCnt = 0;
      for (i = 0; i < SAMPLE_SIZE; i++) {
        correctCnt += checkTask(i);
        document.frm.an[i].disabled = true;
      }
      if (etime - ctime <= 0)
        t_msg = " **TIME**";
      else
        t_msg = " ";
      cdt = new Date();
      document.frm.log.value = cdt.toString().substring(16, 24) + ": " +
        correctCnt + " correct answers out of " + SAMPLE_SIZE + t_msg +
        "(operation:" + operands_str + ")\n" +
        document.frm.log.value;
      saveResult(cdt, document.frm.level.value, correctCnt, SAMPLE_SIZE);
      alert(correctCnt + " correct answers out of " + SAMPLE_SIZE);
    }
    function saveResult(dateTime, level, score, total) {
      var results = [];
      try {
        var saved = localStorage.getItem(RESULTS_STORAGE_KEY);
        if (saved) {
          results = JSON.parse(saved);
        }
      } catch (e) {
        results = [];
      }
      results.unshift({
        datetime: dateTime.toISOString(),
        level: level,
        score: score,
        total: total
      });
      if (results.length > 5) {
        results = results.slice(0, 5);
      }
      localStorage.setItem(RESULTS_STORAGE_KEY, JSON.stringify(results));
    }
    function showSavedResults() {
      var results = [];
      try {
        var saved = localStorage.getItem(RESULTS_STORAGE_KEY);
        if (saved) {
          results = JSON.parse(saved);
        }
      } catch (e) {
        results = [];
      }
      if (!results.length) {
        alert("No saved test results yet.");
        return;
      }
      var lines = [];
      var totalScore = 0;
      var totalQuestions = 0;
      lines.push("Last " + results.length + " test results:");
      for (var i = 0; i < results.length; i++) {
        var item = results[i];
        var dateLabel = item.datetime ? new Date(item.datetime).toLocaleString() : "Unknown time";
        lines.push((i + 1) + ". " + dateLabel + " | Level: " + item.level + " | Score: " + item.score + "/" + item.total);
        totalScore += parseInt(item.score, 10) || 0;
        totalQuestions += parseInt(item.total, 10) || 0;
      }
      if (totalQuestions > 0) {
        var avgPercent = ((totalScore / totalQuestions) * 100).toFixed(1);
        lines.push("");
        lines.push("Average score: " + avgPercent + "%");
      }
      alert(lines.join("\n"));
    }
    function setTask(i) {
      //document.frm.op[i].value=Math.random() > 0.5 ? '*' : '+';
      document.frm.op[i].value = a_operands[getRandom(1, operands_count) - 1];
      document.frm.an[i].value = "";
      document.frm.an[i].disabled = false;
      document.frm.rs[i].value = "";
      document.frm.rs[i].className = "hidTask";
      document.frm.sc[i].value = 0;
      if (document.frm.op[i].value == '-') {
        //x=getRandom(1,10);
        //document.frm.ro[i].value=getRandom(1,10);
        //document.frm.lo[i].value=parseInt(document.frm.ro[i].value) + parseInt(x);
        var leftValue = getRandom(limits.get('low-'+ document.frm.level.value), limits.get('high-'+ document.frm.level.value));
        var rightValue = getRandom(limits.get('low-'+ document.frm.level.value), limits.get('high-'+ document.frm.level.value));
        if (leftValue < rightValue) {
          var tmp = leftValue;
          leftValue = rightValue;
          rightValue = tmp;
        }
        document.frm.lo[i].value = leftValue;
        document.frm.ro[i].value = rightValue;
      } else if (document.frm.op[i].value == '+') {
        document.frm.lo[i].value = getRandom(limits.get('low-'+ document.frm.level.value), limits.get('high-'+ document.frm.level.value));
        document.frm.ro[i].value = getRandom(limits.get('low-'+ document.frm.level.value), limits.get('high-'+ document.frm.level.value));
      } else {
        document.frm.lo[i].value = getRandom(-11, 11);
        document.frm.ro[i].value = getRandom(-11, 11);
      }
    }
    function checkTask(i) {
      res = eval(document.frm.lo[i].value + ' ' + document.frm.op[i].value + ' ' + document.frm.ro[i].value);
      if (document.frm.an[i].value.length > 0 && res == document.frm.an[i].value) {
        document.frm.rs[i].value = "OK";
        document.frm.rs[i].className = "correct";
        document.frm.sc[i].value = 1;
      } else {
        document.frm.rs[i].value = res;
        document.frm.rs[i].className = "wrong";
        document.frm.sc[i].value = 0;
      }
      return parseInt(document.frm.sc[i].value);
    }
    function nextField(e) {
      if (e.keyCode == 13 || e.keyCode == 9 || e.keyCode == 40) {
        e.preventDefault();
        var inputs = document.getElementsByName('an');
        for (var i = 0; i < inputs.length; i++) {
          if (document.activeElement.id == inputs[i].id && i + 1 < inputs.length) {
            inputs[i + 1].focus();
            break;
          }
        }
      }
    }
  </script>


</head>

<body>
  <div class="app-shell">
    <h1>Math Drills</h1>
    <form name="frm">
      <div class="controls-row">
        <label><input type="radio" id="levelEasy" name="level" value="easy" checked>Easy</label>
        <label><input type="radio" id="levelHard" name="level" value="hard">Hard</label>
      </div>
      <div class="controls-row">
        <label><input type="checkbox" name="operands" value="+" checked="checked">Addition</label>
        <label><input type="checkbox" name="operands" value="-">Substraction</label>
        <label><input type="checkbox" name="operands" value="*">Multiplication</label>
      </div>
      <div class="actions-row">
        <input name="btnPrepare" type="button" value="Start New Test" onclick="prepare();">
        <input name="btnCheck" type="button" value="Check Results" onclick="check();" disabled="disabled">
        <input name="btnSavedResults" type="button" value="Show Last 5 Results" onclick="showSavedResults();">
        <span id="sessionTimer" class="session-timer"></span>
      </div>
      <div class="tasks-wrap">
        <table>
      <!-- This is the format
<tr>
   <td><input type="text" size="2" name="lo" readonly="readonly" class="task">
   <td><input type="text" size="1" name="op" readonly="readonly" class="task">
   <td><input type="text" size="2" name="ro" readonly="readonly" class="task">
   <td class="task">=
   <td><input type="text" size="3" name="an" class="task">
   <td><input type="text" size="3" name="rs" readonly="readonly" class="task">
           <input type="hidden" name="sc">
</tr>
-->
      <script>
        for (i = 0; i < SAMPLE_SIZE; i++)
          document.write('<tr><td><input type="text" size="2" name="lo" readonly="readonly" tabindex="-1" class="task"><td><input type="text" size="1" name="op" readonly="readonly" tabindex="-1" class="task"><td><input type="text" size="2" name="ro" readonly="readonly" tabindex="-1" class="task"><td class="task">=<td><input type="text" size="3" name="an" class="task" id="' + i + '" onkeydown="return nextField(event);"><td><input type="text" size="3" name="rs" readonly="readonly" tabindex="-1" class="hidTask"><input type="hidden" name="sc"></tr>');
      </script>
        </table>
      </div>
      <textarea name="log" cols="95" rows="5" readonly="readonly">
</textarea>
    </form>
  </div>
</body>

</html>
